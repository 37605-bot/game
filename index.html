<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karan Sandhu | Math Problems</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
		:root {
			--primary: #ff3e60;
			--primary-glow: rgba(255, 62, 96, 0.3);
			--bg: #0f172a;
			--surface: #1e293b;
			--surface-hover: #334155;
			--text: #f8fafc;
			--text-dim: #94a3b8;
			--radius: 16px;
			--transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		}

		* {
			box-sizing: border-box;
		}

		body {
			font-family: 'Inter', sans-serif;
			margin: 0;
			background-color: var(--bg);
			color: var(--text);
			line-height: 1.6;
			overflow-x: hidden;
		}

		/* Modern Header with Blur */
		header {
			position: sticky;
			top: 0;
			z-index: 1000;
			background: rgba(15, 23, 42, 0.8);
			backdrop-filter: blur(12px);
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			padding: 1rem 2rem;
		}

		.nav-container {
			max-width: 1400px;
			margin: 0 auto;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 2rem;
		}

		.logo {
			font-size: 1.5rem;
			font-weight: 800;
			background: linear-gradient(90deg, #ff3e60, #ff7e5f);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			white-space: nowrap;
		}

		.search-wrapper {
			flex: 1;
			max-width: 600px;
			position: relative;
		}

		#searchBar {
			width: 100%;
			padding: 0.8rem 1.2rem;
			border-radius: var(--radius);
			border: 1px solid rgba(255, 255, 255, 0.1);
			background: var(--surface);
			color: white;
			font-size: 1rem;
			transition: var(--transition);
		}

		#searchBar:focus {
			outline: none;
			border-color: var(--primary);
			box-shadow: 0 0 0 4px var(--primary-glow);
		}

		/* Grid Layout */
		.main-content {
			max-width: 1400px;
			margin: 2rem auto;
			padding: 0 2rem;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
			gap: 2rem;
		}

		/* Game Cards */
		.card {
			background: var(--surface);
			border-radius: var(--radius);
			overflow: hidden;
			border: 1px solid rgba(255, 255, 255, 0.05);
			transition: var(--transition);
			cursor: pointer;
			position: relative;
		}

		.card:hover {
			transform: translateY(-8px);
			border-color: var(--primary);
			box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
		}

		.card img {
			width: 100%;
			aspect-ratio: 16/10;
			object-fit: cover;
			transition: var(--transition);
		}

		.card:hover img {
			transform: scale(1.05);
		}

		.card-info {
			padding: 1rem;
			font-weight: 600;
			text-align: center;
		}

		/* Game Viewer Overlay */
		#viewer {
			position: fixed;
			inset: 0;
			background: var(--bg);
			z-index: 2000;
			display: none;
			flex-direction: column;
		}

		.viewer-header {
			padding: 1rem 2rem;
			display: flex;
			justify-content: space-between;
			align-items: center;
			background: var(--surface);
		}

		.btn-close {
			background: var(--primary);
			color: white;
			border: none;
			padding: 0.6rem 1.5rem;
			border-radius: 8px;
			font-weight: 600;
			cursor: pointer;
			transition: var(--transition);
		}

		.btn-close:hover {
			opacity: 0.9;
			transform: scale(1.05);
		}

		iframe {
			flex: 1;
			border: none;
			width: 100%;
			height: 100%;
			background: #000;
		}

		footer {
			text-align: center;
			padding: 4rem 2rem;
			color: var(--text-dim);
			border-top: 1px solid rgba(255, 255, 255, 0.05);
			margin-top: 4rem;
		}

		/* Loading Spinner */
		.loader {
			border: 4px solid rgba(255, 255, 255, 0.1);
			border-left-color: var(--primary);
			border-radius: 50%;
			width: 40px;
			height: 40px;
			animation: spin 1s linear infinite;
			margin: 2rem auto;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		@media (max-width: 768px) {
			.nav-container {
				flex-direction: column;
				gap: 1rem;
			}

			.grid {
				grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
			}
		}
	</style>
</head>

<body>

    <header>
        <div class="nav-container">
            <div class="logo">KARAN SANDHU</div>
            <div class="search-wrapper">
                <input type="text" id="searchBar" placeholder="Search math problems..." oninput="search()">
            </div>
                <div style="font-size: 0.8rem; color: var(--text-dim)">v2.1 Stable</div>
            </div>
    </header>

    <main class="main-content">
        <h2 style="margin-bottom: 2rem;">Math Problems</h2>
        <div id="loader" class="loader"></div>
        <div id="gameGrid" class="grid"></div>
    </main>

    <div id="viewer">
        <div class="viewer-header">
            <h2 id="activeTitle" style="margin:0; font-size: 1.2rem;">Problem</h2>
            <button class="btn-close" onclick="closeGame()">CLOSE</button>
        </div>
        <iframe id="gameFrame"></iframe>
    </div>

	<footer>
		<p>&copy; 2026 Karan Sandhu Math. All rights reserved.</p>
		<p style="font-size: 0.8rem;">Math practice problems for students.</p>
	</footer>

    <script>
        const grid = document.getElementById('gameGrid');
        const loader = document.getElementById('loader');
        const viewer = document.getElementById('viewer');
        const frame = document.getElementById('gameFrame');
        
        const ASSETS = "https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json";
        const COVERS = "https://cdn.jsdelivr.net/gh/gn-math/covers@main";
        const HTMLS = "https://cdn.jsdelivr.net/gh/gn-math/html@main";

        let gameLibrary = [];

        async function loadGames() {
            try {
                const res = await fetch(ASSETS);
                gameLibrary = await res.json();
                render(gameLibrary);
                loader.style.display = 'none';
            } catch (err) {
                grid.innerHTML = `<p>Error loading games. Please refresh.</p>`;
            }
        }

        function render(data) {
            grid.innerHTML = data.map(game => `
                <div class="card" onclick="playGame('${game.id}')">
                    <img src="${game.cover.replace('{COVER_URL}', COVERS)}" alt="${game.name}" loading="lazy">
                    <div class="card-info">${game.name}</div>
                </div>
            `).join('');
        }

        function search() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = gameLibrary.filter(g => g.name.toLowerCase().includes(term));
            render(filtered);
        }

        function playGame(id) {
            const game = gameLibrary.find(g => g.id == id);
            if (!game) return;

            document.getElementById('activeTitle').innerText = game.name;
            const targetUrl = game.url.replace('{HTML_URL}', HTMLS);
            
            // Show viewer and load content
            viewer.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            fetch(targetUrl).then(r => r.text()).then(html => {
                const doc = frame.contentWindow.document;
                doc.open();
                doc.write(html);
                doc.close();
            });
        }

        function closeGame() {
            viewer.style.display = 'none';
            document.body.style.overflow = 'auto';
            frame.src = "about:blank";
        }

        // Initialize
        loadGames();
    </script>
</body>

</html>
